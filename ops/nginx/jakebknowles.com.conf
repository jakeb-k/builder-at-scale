server {
  listen 80;
  listen [::]:80;
  server_name www.jakebknowles.com;

  return 301 http://jakebknowles.com$request_uri;
}

server {
  listen 80;
  listen [::]:80;
  server_name jakebknowles.com;

  root /var/www/jakebknowles.com/current;
  index index.html;

  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  error_page 404 /404.html;

  location = /404.html {
    internal;
  }
}
